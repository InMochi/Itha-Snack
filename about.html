  <style>
    @import url("https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap");

    :root {
      --clr-black: #333;
      --clr-white: #fff;
      --custom-border: 0.1rem solid var(--clr-black);
      --custom-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
    }

    * {
      font-family: "Montserrat", sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      outline: none;
      border: none;
      text-decoration: none;
      transition: all 0.2s linear;
    }

    /* Reset untuk避免 gap */
    #app {
      margin: 0;
      padding: 0;
      display: contents;
    }

    header.fixed {
      top: 0;
      left: 0;
      margin-top: 0;
    }

    /* Hapus semua gap */
    html, body {
      margin: 0;
      padding: 0;
      border: 0;
    }

    /* AUTHORS - using custom names to avoid Tailwind conflicts */
    .author-card-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: center;
      gap: 1.5rem;
      justify-content: center;
    }

    .author-card {
      position: relative;
      text-align: center;
      border: var(--custom-border);
      box-shadow: var(--custom-shadow);
      overflow: hidden;
      border-radius: 0.5rem;
    }

    .author-card img {
      width: 100%;
      height: 26rem;
      object-fit: cover;
    }

    .author-social {
      position: absolute;
      top: 0;
      left: -10rem;
    }

    .author-card:hover .author-social {
      left: 1rem;
    }

    .author-social a {
      height: 3.2rem;
      width: 3.2rem;
      line-height: 3.2rem;
      font-size: 1.5rem;
      background-color: var(--clr-white);
      border: var(--custom-border);
      display: block;
      margin-top: 1rem;
      border-radius: 1rem;
      color: var(--clr-black);
    }

    .author-social a:hover {
      background-color: var(--clr-black);
      color: var(--clr-white);
    }

    .author-card h3 {
      font-size: 2.5rem;
      color: var(--clr-black);
      padding: 1.5rem;
      background-color: var(--clr-white);
    }
  </style>

</head>
