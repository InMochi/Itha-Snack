<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <title>About Itha Snack</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap");

      :root {
        --black: #333;
        --white: #fff;
        --border: 0.1rem solid var(--black);
        --box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
      }

      * {
        font-family: "Rubik", sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        outline: none;
        border: none;
        text-decoration: none;
        transition: all 0.2s linear;
      }

      /* AUTHORS */
      .authors .box-container {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        align-items: center;
        gap: 1.5rem;
        justify-content: center;
      }

      .authors .box-container .box {
        position: relative;
        text-align: center;
        border: var(--border);
        box-shadow: var(--box-shadow);
        overflow: hidden;
        border-radius: 0.5rem;
      }

      .authors .box-container .box img {
        width: 100%;
        height: 26rem;
        object-fit: cover;
      }

      .authors .box-container .box .share {
        position: absolute;
        top: 0;
        left: -10rem;
      }

      .authors .box-container .box:hover .share {
        left: 1rem;
      }

      .authors .box-container .box .share a {
        height: 3.2rem;
        width: 3.2rem;
        line-height: 3.2rem;
        font-size: 1.5rem;
        background-color: var(--white);
        border: var(--border);
        display: block;
        margin-top: 1rem;
        border-radius: 1rem;
        color: var(--black);
      }

      .authors .box-container .box a:hover {
        background-color: var(--black);
        color: var(--white);
      }

      .authors .box-container .box h3 {
        font-size: 2.5rem;
        color: var(--black);
        padding: 1.5rem;
        background-color: var(--white);
      }
    </style>
  </head>
