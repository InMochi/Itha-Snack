<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temukan Kami - Itha Snack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: hsl(35, 30%, 96%);
      --foreground: hsl(25, 30%, 12%);
      --primary: hsl(30, 80%, 50%);
      --primary-10: hsla(30, 80%, 50%, 0.1);
      --muted-foreground: hsl(25, 15%, 45%);
      --border: hsl(30, 20%, 85%);
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .findus-section {
      padding: 4rem 1rem;
      background-color: var(--background);
    }

    @media (min-width: 768px) {
      .findus-section {
        padding: 6rem 2rem;
      }
    }

    @media (min-width: 1024px) {
      .findus-section {
        padding: 6rem 4rem;
      }
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .section-header.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .section-label {
      color: var(--primary);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: 2.25rem;
      font-weight: 700;
      font-family: var(--font-display);
      line-height: 1.2;
    }

    @media (min-width: 768px) {
      .section-title {
        font-size: 3rem;
      }
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      max-width: 64rem;
      margin: 0 auto;
    }

    @media (min-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .map-wrapper {
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border);
      height: 20rem;
      opacity: 0;
      transform: translateX(-30px);
      transition: opacity 0.7s ease 0.15s, transform 0.7s ease 0.15s;
    }

    .map-wrapper.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .map-wrapper iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 320px;
      border: 0;
    }

    @media (min-width: 1024px) {
      .map-wrapper {
        height: auto;
        min-height: 320px;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2rem;
      opacity: 0;
      transform: translateX(30px);
      transition: opacity 0.7s ease 0.15s, transform 0.7s ease 0.15s;
    }

    .contact-info.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .contact-item {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
    }

    .contact-icon-wrapper {
      flex-shrink: 0;
      width: 3rem;
      height: 3rem;
      border-radius: 0.75rem;
      background-color: var(--primary-10);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .contact-icon-wrapper svg {
      width: 1.5rem;
      height: 1.5rem;
      color: var(--primary);
    }

    .contact-label {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      margin-bottom: 0.25rem;
    }

    .contact-value {
      color: var(--foreground);
      font-weight: 500;
      line-height: 1.5;
    }

    a.wa-link {
      text-decoration: none;
      color: var(--foreground);
      transition: color 0.2s ease;
    }

    a.wa-link:hover {
      color: gray;
    }
  </style>

</head>

<body>

  <section id="findus" class="findus-section">

    <div class="container">

      <div class="section-header" data-animate>
        <p class="section-label">Lokasi</p>
        <h2 class="section-title">Temukan Kami</h2>
      </div>

      <div class="content-grid">

        <div class="map-wrapper" data-animate>
          <iframe
            title="Itha Snack Location"
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3966.0!2d106.8!3d-6.2!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNsKwMTInMDAuMCJTIDEwNsKwNDgnMDAuMCJF!5e0!3m2!1sid!2sid!4v1600000000000!5m2!1sid!2sid"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>

        <div class="contact-info" data-animate>

          <div class="contact-item">
            <div class="contact-icon-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div>
              <p class="contact-label">Alamat</p>
              <p class="contact-value">Jl. Rasa Gurih No. 12, Jakarta Selatan, Indonesia</p>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
            <div>
              <p class="contact-label">Telepon</p>
              <a class="contact-value wa-link" href="https://wa.me/6282123699200" target="_blank">+62 821 2369 9200</a>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </div>
            <div>
              <p class="contact-label">Email</p>
              <p class="contact-value">ithasnack@gmail.com</p>
            </div>
          </div>

        </div>

      </div>

    </div>

  </section>

  <script>
    (function() {
      var elements = document.querySelectorAll('[data-animate]');
      if (!elements.length) return;

      var observer = new IntersectionObserver(function(entries) {
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].isIntersecting) {
            entries[i].target.classList.add('visible');
            observer.unobserve(entries[i].target);
          }
        }
      }, { threshold: 0.15 });

      for (var i = 0; i < elements.length; i++) {
        observer.observe(elements[i]);
      }
    })();
  </script>

</body>

</html>
