<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <title>Itha Snack</title>
    <style>
      :root {
        --orange: #e68019;
        --brown: #47382e;
        --orange-light: #f5a04a;
      }

      header {
        background: var(--brown);
        padding: 0 2.5rem;
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: fixed;
        width: 100%;
        z-index: 999;
        box-shadow: 0 2px 24px rgba(71, 56, 46, 0.25);
      }

      .nav-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
      }

      .nav-logo-icon {
        width: 38px;
        height: 38px;
        background: transparent;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        color: white;
      }

      .nav-logo-text {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: white;
        letter-spacing: 0.5px;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 0.25rem;
      }

      nav ul li a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.9rem;
        font-weight: 500;
        padding: 0.45rem 1rem;
        border-radius: 999px;
        transition: all 0.2s;
        letter-spacing: 0.3px;
      }

      nav ul li a:hover,
      nav ul li a.active {
        background: rgba(230, 128, 25, 0.2);
        color: var(--orange-light);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <header>
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon"><img src="./public/logo.png" alt="Logo" class="w-full h-full object-cover"></div>
        <span class="nav-logo-text">Itha Snack</span>
      </a>
      <nav>
        <ul>
          <li><a href="index.html" class="active">Beranda</a></li>
          <li><a href="about.html">Tentang</a></li>
          <li><a href="contact.html">Kontak</a></li>
          <li><a href="shop.html">Toko</a></li>
        </ul>
      </nav>
    </header>

    <div
      class="h-screen bg-[url(/img/background.webp)] bg-cover relative flex justify-center items-center"
    >
      <div class="h-screen w-screen bg-[#47382e] absolute opacity-35"></div>
      <div
        class="flex text-center h-[80%] text-white absolute justify-center flex-col mt-20"
      >
        <p class="text-[#E68019] font-[dm_sans] font-semibold tracking-[0.3em]">
          PREMIUM ONION CHIPS
        </p>
        <p class="text-[96px] font-[playfair_display]">
          Itha
          <span
            class="bg-linear-to-r from-[#f4b925] via-[#e68019] to-[#c34b22] bg-clip-text text-transparent"
            >Snacks</span
          >
        </p>
        <p class="w-[70%] self-center font-sans">
          Renyah, gurih, dan bikin nagih. Keripik bawang premium dengan cita
          rasa yang tak terlupakan.
        </p>
        <div class="flex justify-between w-[50%] self-center mt-5 text-white">
          <a class="px-8 py-4 m-auto bg-[#E68019] rounded-[10px]" href="#"
            >Beli Sekarang</a
          >
          <a
            class="px-8 py-4 m-auto border border-white hover:bg-[#F7F4ED]/20 rounded-[10px]"
            href="#"
            >Lihat Produk</a
          >
        </div>
        <div
          class="w-6 h-10 border-2 rounded-2xl flex justify-center pt-2 self-center mt-6 animate-bounce border-white"
        >
          <div class="w-1.5 h-3 rounded-full bg-[#E68019]"></div>
        </div>
      </div>
    </div>
  </body>
</html>
